<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Pizza - Brüche üben</title>
    <style>
        /* Grundlegendes Reset und Fullscreen */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #333;
        }

        /* 2D DOM Overlay - Hier passiert die Interaktion */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Klicks gehen durch auf den Touch-Layer, es sei denn es ist ein Button */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* Alle interaktiven UI-Elemente wieder klickbar machen */
        .interactive {
            pointer-events: auto;
        }

        /* Header (Punkte) */
        #header {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            margin: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            display: none; /* Wird angezeigt, wenn AR startet */
        }

        /* Haupt-Aufgabenbox unten */
        #task-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            margin: 15px;
            border-radius: 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.15);
            text-align: center;
            display: none;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        /* Shake-Animation für visuelles Fehler-Feedback */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .task-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d35400;
        }

        .task-instruction {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* Aufgabe 1: Bruch-Eingabe */
        #task-1-ui { display: none; }
        .fraction-input {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 10px;
        }
        .fraction-input input {
            width: 60px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            background: #fff;
        }
        .fraction-line {
            width: 100%;
            height: 4px;
            background-color: #333;
            margin: 5px 0;
            border-radius: 2px;
        }

        /* Aufgabe 2: Regler UI */
        #task-2-ui { display: none; }
        
        /* Neuer Vertikaler Slider */
        .vertical-slider-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 180px;
            margin: 15px 0;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
        }
        
        .vertical-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 30px;
            height: 100%;
            outline: none;
            accent-color: #d35400;
            writing-mode: bt-lr; /* Fallback */
        }

        .slider-val {
            color: #2980b9;
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            gap: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 0 #2980b9;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #2980b9;
        }
        button.success {
            background-color: #2ecc71;
            box-shadow: 0 4px 0 #27ae60;
        }

        /* Feedback Toast Overlay */
        #feedback-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .feedback-success { background-color: #2ecc71; }
        .feedback-error { background-color: #e74c3c; }

        /* Start Screen Info */
        #start-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            font-size: 1.2rem;
            width: 80%;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="header" class="interactive">
            <span>🍕 Pizza-Brüche</span>
            <span>Punkte: <span id="score">0</span></span>
        </div>

        <div id="task-panel" class="interactive">
            <!-- Aufgabe 1: Welcher Bruch ist das? -->
            <div id="task-1-ui">
                <div class="task-title">Aufgabe 1</div>
                <div class="task-instruction">Welcher Bruch liegt auf dem Tisch?</div>
                <div>
                    Ich sehe: 
                    <div class="fraction-input">
                        <input type="number" id="input-numerator" placeholder="?" inputmode="numeric">
                        <div class="fraction-line"></div>
                        <input type="number" id="input-denominator" placeholder="?" inputmode="numeric">
                    </div>
                </div>
                <div class="button-group">
                    <button class="success" id="btn-check-task1">Prüfen</button>
                </div>
            </div>

            <!-- Aufgabe 2: Pizza mit einem Slider einstellen -->
            <div id="task-2-ui">
                <div class="task-title">Aufgabe 2</div>
                <div class="task-instruction" id="instruction-task2">Stelle den Bruch X/Y dar!</div>
                
                <div class="vertical-slider-container">
                    <!-- Vertikaler Slider (1 oben, 0 unten) -->
                    <input type="range" id="slider-size" class="vertical-slider" min="0" max="1" step="0.01" value="0" orient="vertical">
                    <div style="margin-left: 30px; text-align: center;">
                        <div style="font-weight: 600; color: #555;">Pizza-Anteil</div>
                        <div id="val-size" class="slider-val">0%</div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="success" id="btn-check-task2">Prüfen</button>
                </div>
            </div>
        </div>
    </div>

    <div id="feedback-toast">Feedback</div>
    <div id="start-info">Suche mit der Kamera eine freie Tischfläche. Sobald der Ring erscheint, tippe auf den Bildschirm!</div>

    <!-- Three.js und WebXR Bibliotheken -->
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- Globale Variablen ---
        let camera, scene, renderer;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let gameState = 'INIT'; // INIT, FINDING_SURFACE, PLAYING, TASK1, TASK2
        let score = 0;
        let currentTask = null; // Speichert Zähler und Nenner der aktuellen Aufgabe
        
        // Pizza Objekte
        let pizzaGroup = new THREE.Group();
        const PIZZA_RADIUS = 0.15; // 15cm Radius in AR
        
        // Erlaubte Nenner für die 5. Klasse
        const allowedDenominators = [2, 3, 4, 5, 6, 8, 10];

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Licht
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(0, 2, 0);
            scene.add(dirLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // AR Button hinzufügen (mit DOM Overlay Unterstützung)
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-container') }
            }));

            // Reticle (Zielkreuz zum Platzieren)
            const reticleGeometry = new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2);
            const reticleMaterial = new THREE.MeshBasicMaterial({ color: 0x2ecc71 });
            reticle = new THREE.Mesh(reticleGeometry, reticleMaterial);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Events
            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onXRSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);

            // Button Event Listener
            document.getElementById('btn-check-task1').addEventListener('click', checkTask1);
            document.getElementById('btn-check-task2').addEventListener('click', checkTask2);

            // Slider Event Listener für den neuen Pizza-Größen Regler
            document.getElementById('slider-size').addEventListener('input', (e) => {
                const percentage = Math.round(e.target.value * 100);
                document.getElementById('val-size').innerText = percentage + '%';
                updateTask2Pizza();
            });

            renderer.xr.addEventListener('sessionstart', () => {
                gameState = 'FINDING_SURFACE';
                document.getElementById('start-info').style.display = 'block';
            });
        }

        // --- AR Platzierung ---
        function onXRSelect() {
            if (gameState === 'FINDING_SURFACE' && reticle.visible) {
                // Pizza platzieren
                pizzaGroup.position.setFromMatrixPosition(reticle.matrix);
                scene.add(pizzaGroup);
                
                gameState = 'PLAYING';
                reticle.visible = false;
                document.getElementById('start-info').style.display = 'none';
                document.getElementById('header').style.display = 'flex';
                
                startRandomTask();
            }
        }

        // --- Spiel-Logik & Aufgaben-Generierung ---
        function startRandomTask() {
            clearPizza();
            resetTaskUI();

            // Zufälligen Bruch erstellen
            const den = allowedDenominators[Math.floor(Math.random() * allowedDenominators.length)];
            const num = Math.floor(Math.random() * (den - 1)) + 1; // 1 bis Nenner-1
            currentTask = { numerator: num, denominator: den };

            // Zufällig Aufgabe 1 oder 2 wählen (50/50)
            const type = Math.random() < 0.5 ? 1 : 2;

            if (type === 1) {
                setupTask1(num, den);
            } else {
                setupTask2(num, den);
            }
        }

        function resetTaskUI() {
            document.getElementById('task-panel').style.display = 'none';
            document.getElementById('task-1-ui').style.display = 'none';
            document.getElementById('task-2-ui').style.display = 'none';
            document.getElementById('input-numerator').value = '';
            document.getElementById('input-denominator').value = '';
        }

        function clearPizza() {
            while(pizzaGroup.children.length > 0){ 
                pizzaGroup.remove(pizzaGroup.children[0]); 
            }
        }

        // --- Aufgabe 1: Bruch erkennen ---
        function setupTask1(num, den) {
            gameState = 'TASK1';
            
            // Pizza mit N Stücken rendern (unvollständig)
            const anglePerSlice = (Math.PI * 2) / den;
            const gap = 0.05;

            for (let i = 0; i < num; i++) {
                createPizzaSlice(i * anglePerSlice, anglePerSlice - gap, true);
            }

            document.getElementById('task-panel').style.display = 'block';
            document.getElementById('task-1-ui').style.display = 'block';
        }

        function checkTask1() {
            const numIn = parseInt(document.getElementById('input-numerator').value);
            const denIn = parseInt(document.getElementById('input-denominator').value);

            if (isNaN(numIn) || isNaN(denIn)) {
                showFeedback("Fehler: Bitte trage beide Zahlen ein!", false);
                return;
            }

            // Akzeptiere mathematisch korrekte Äquivalenz
            if (numIn / denIn === currentTask.numerator / currentTask.denominator) {
                showFeedback("Richtig! Super!", true);
                score++;
                document.getElementById('score').innerText = score;
                setTimeout(startRandomTask, 2000); 
            } else {
                showFeedback("Fehler: Das ist leider falsch. Zähle die Stücke genau!", false);
            }
        }

        // --- Aufgabe 2: Bruch am Regler einstellen ---
        function setupTask2(num, den) {
            gameState = 'TASK2';
            
            document.getElementById('instruction-task2').innerText = `Stelle den Bruch ${num}/${den} dar!`;
            
            const slider = document.getElementById('slider-size');
            slider.value = 0;
            document.getElementById('val-size').innerText = '0%';

            document.getElementById('task-panel').style.display = 'block';
            document.getElementById('task-2-ui').style.display = 'block';

            updateTask2Pizza();
        }

        function updateTask2Pizza() {
            clearPizza();
            const fillAmount = parseFloat(document.getElementById('slider-size').value);
            
            // Leicht transparenten Kreis als Schätzhilfe für die "ganze" Pizza einzeichnen
            const grayGeo = new THREE.CylinderGeometry(PIZZA_RADIUS, PIZZA_RADIUS, 0.003, 32);
            const grayMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.25 });
            const graySlice = new THREE.Mesh(grayGeo, grayMat);
            pizzaGroup.add(graySlice);
            
            if (fillAmount > 0) {
                // Berechne den Winkel basierend auf dem Slider von 0.0 bis 1.0
                const angle = fillAmount * (Math.PI * 2);
                // Erstelle ein großes zusammenhängendes Stück
                createPizzaSlice(0, angle, true);
            }
        }

        function checkTask2() {
            const fillAmount = parseFloat(document.getElementById('slider-size').value);
            const target = currentTask.numerator / currentTask.denominator;
            
            // Da ein stufenloser Regler schwer haargenau zu treffen ist, erlauben wir 8% Toleranz
            const tolerance = 0.08; 
            
            if (Math.abs(fillAmount - target) <= tolerance) {
                showFeedback("Perfekt geschätzt! +1 Punkt", true);
                score++;
                document.getElementById('score').innerText = score;
                setTimeout(startRandomTask, 2000);
            } else {
                const percentFill = Math.round(fillAmount * 100);
                const percentTarget = Math.round(target * 100);
                showFeedback(`Zu ungenau! Das waren ca. ${percentFill}%, gesucht waren ${currentTask.numerator}/${currentTask.denominator} (ca. ${percentTarget}%).`, false);
            }
        }

        // --- Helfer: Pizza Visuell Bauen ---
        function createPizzaSlice(startAngle, lengthAngle, isNormal = true) {
            if (isNormal) {
                // Normales, belegtes Pizzastück
                const doughGeo = new THREE.CylinderGeometry(PIZZA_RADIUS, PIZZA_RADIUS, 0.01, 32, 1, false, startAngle, lengthAngle);
                const doughMat = new THREE.MeshLambertMaterial({ color: 0xd4a373 });
                const dough = new THREE.Mesh(doughGeo, doughMat);
                pizzaGroup.add(dough);

                const cheeseGeo = new THREE.CylinderGeometry(PIZZA_RADIUS * 0.9, PIZZA_RADIUS * 0.9, 0.012, 32, 1, false, startAngle, lengthAngle);
                const cheeseMat = new THREE.MeshLambertMaterial({ color: 0xffda5a });
                const cheese = new THREE.Mesh(cheeseGeo, cheeseMat);
                cheese.position.y = 0.001;
                pizzaGroup.add(cheese);
                
                if (lengthAngle > 0.1) {
                    const salamiGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.005, 16);
                    const salamiMat = new THREE.MeshLambertMaterial({ color: 0xc0392b });
                    
                    // Salami-Menge an die Größe des Stücks anpassen
                    const numSalami = Math.floor((lengthAngle / (Math.PI * 2)) * 7) + 1; 
                    for(let i=0; i<numSalami; i++) {
                        const salami = new THREE.Mesh(salamiGeo, salamiMat);
                        const r = Math.random() * (PIZZA_RADIUS * 0.7);
                        const a = startAngle + (Math.random() * lengthAngle);
                        salami.position.set(Math.cos(a) * r, 0.01, Math.sin(a) * r);
                        pizzaGroup.add(salami);
                    }
                }
            } else {
                // Ausgegrautes Stück (transparentes Grau)
                const grayGeo = new THREE.CylinderGeometry(PIZZA_RADIUS, PIZZA_RADIUS, 0.005, 32, 1, false, startAngle, lengthAngle);
                const grayMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 });
                const graySlice = new THREE.Mesh(grayGeo, grayMat);
                pizzaGroup.add(graySlice);
            }
        }

        // --- UI Feedback System ---
        function showFeedback(text, isSuccess) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = text;
            toast.className = isSuccess ? 'feedback-success' : 'feedback-error';
            toast.style.opacity = 1;

            // Bei Fehler die Box kurz rütteln lassen
            if (!isSuccess) {
                const panel = document.getElementById('task-panel');
                panel.classList.remove('shake');
                void panel.offsetWidth; // Animation zurücksetzen (Reflow)
                panel.classList.add('shake');
            }
            
            setTimeout(() => {
                toast.style.opacity = 0;
            }, 3000);
        }

        // --- Standard ThreeJS Boilerplate ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame && gameState === 'FINDING_SURFACE') {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                        gameState = 'INIT';
                        document.getElementById('start-info').style.display = 'none';
                        document.getElementById('header').style.display = 'none';
                        resetTaskUI();
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
